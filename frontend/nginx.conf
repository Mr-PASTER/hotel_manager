server {
    listen 80;
    server_name _;

    # Статические файлы React (SPA)
    root /usr/share/nginx/html;
    index index.html;

    # Размер тела запроса
    client_max_body_size 10M;

    # React SPA — все роуты отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — проксируем на FastAPI backend
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cookie-based auth — разрешаем передачу credentials
        proxy_pass_header  Set-Cookie;

        # Таймауты
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # Кэш статических ассетов
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Запрет доступа к скрытым файлам
    location ~ /\. {
        deny all;
    }
}
