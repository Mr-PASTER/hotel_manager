services:
    postgres:
        image: postgres:15-alpine
        container_name: hotel_postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-hotel}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotel_secret}
            POSTGRES_DB: ${POSTGRES_DB:-hotel_manager}
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotel}"]
            interval: 5s
            timeout: 5s
            retries: 10

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: hotel_backend
        restart: unless-stopped
        ports:
            - "${BACKEND_PORT:-3000}:3000"
        environment:
            PORT: 3000
            DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hotel}:${POSTGRES_PASSWORD:-hotel_secret}@postgres:5432/${POSTGRES_DB:-hotel_manager}
            JWT_SECRET: ${JWT_SECRET}
            JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
            ENCRYPTION_KEY: ${ENCRYPTION_KEY}
            CORS_ORIGIN: https://hotel.mpda.ru
            NODE_ENV: production
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:3000/health'')"',
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: hotel_frontend
        restart: unless-stopped
        ports:
            - "${APP_PORT:-80}:80"
        depends_on:
            backend:
                condition: service_healthy

volumes:
    pgdata:
