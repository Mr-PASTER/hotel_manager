services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotel_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    # Порт 8000 НЕ пробрасываем наружу — доступен только внутри hotel_net через nginx
    # Раскомментируйте для прямого доступа к API при отладке:
    # ports:
    #   - "8000:8000"
    volumes:
      - hotel_data:/app/data
    networks:
      - hotel_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hotel_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - hotel_net

volumes:
  hotel_data:
    name: hotel_data

networks:
  hotel_net:
    name: hotel_net
    driver: bridge
