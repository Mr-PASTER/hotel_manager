<div class="staff-row-mobile" id="staff-mobile-{{ s.id }}" onclick="this.classList.toggle('expanded')">
    <div class="staff-name">
        <span class="user-avatar">👤</span> {{ s.full_name or s.username }}
    </div>
    <div class="staff-details">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.5rem;">
            <div>
                <small style="color: var(--text-muted);">Логин:</small>
                <div style="font-weight: 600;">{{ s.username }}</div>
            </div>
            <div>
                <small style="color: var(--text-muted);">Роль:</small>
                <div>
                    <span
                        class="badge {% if s.role == 'admin' %}badge-danger{% elif s.role == 'moderator' %}badge-primary{% elif s.role == 'worker' %}badge-problem{% elif s.role == 'cleaner' %}badge-success{% else %}badge-success{% endif %}">
                        {% if s.role == 'admin' %}Админ
                        {% elif s.role == 'cleaner' %}Уборщик
                        {% elif s.role == 'worker' %}Рабочий
                        {% elif s.role == 'moderator' %}Модератор
                        {% else %}Персонал{% endif %}
                    </span>
                </div>
            </div>
        </div>
        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
            <button class="filter-btn" hx-get="/staff/{{ s.id }}/details" hx-target="body" hx-swap="beforeend"
                style="flex: 1; padding: 0.5rem; font-size: 0.8rem;" onclick="event.stopPropagation()">
                Профиль
            </button>
            <button class="logout-btn" hx-delete="/staff/{{ s.id }}"
                hx-confirm="Вы уверены, что хотите удалить этого сотрудника?" hx-target="#staff-mobile-{{ s.id }}"
                hx-swap="outerHTML" style="flex: 1; padding: 0.5rem; font-size: 0.8rem;"
                onclick="event.stopPropagation()">
                Удалить
            </button>
        </div>
    </div>
</div>
