<div id="staffModal" class="modal-overlay" onclick="if(event.target == this) this.remove()">
    <div class="modal-content booking-modal-content" onclick="event.stopPropagation()"
        style="width: 500px; max-height: 90vh; display: flex; flex-direction: column; transform: scale(0.95); transform-origin: center;">
        <header class="guest-card-header">
            <div class="avatar-placeholder">👤</div>
            <div>
                <h2
                    style="margin:0; font-size:1.5rem; background: linear-gradient(135deg, #a78bfa, #ec4899); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
                    Профиль: {{ s.full_name or s.username }}
                </h2>
                <p style="margin:4px 0 0; color:var(--text-muted); font-size:0.9rem;">Редактирование данных</p>
            </div>
            <button class="logout-btn" style="margin-left: auto; background: none; border: none; font-size: 1.5rem;"
                onclick="document.getElementById('staffModal').remove()">×</button>
        </header>

        <div class="guest-content-body" style="overflow-y: auto; flex: 1; padding-right: 10px;">
            <form hx-post="/staff/{{ s.id }}/update" hx-target="#staff-{{ s.id }}" hx-swap="outerHTML"
                hx-on::after-request="document.getElementById('staffModal').remove()">
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <div class="input-styled">
                        <label>Логин</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="text" name="username" id="editUsername-{{ s.id }}" value="{{ s.username }}"
                                class="line-editor" required style="flex: 1;">
                            <button type="button" class="btn-base"
                                onclick="generateCredentials('editUsername-{{ s.id }}', 'editPassword-{{ s.id }}')"
                                title="Сгенерировать новые"
                                style="padding: 0 10px; background: var(--warning); border: none; font-size: 0.8rem;">✨</button>
                            <button type="button" class="btn-base" onclick="copyToClipboard('editUsername-{{ s.id }}')"
                                title="Копировать" style="padding: 0 10px;">📋</button>
                        </div>
                    </div>
                    <div class="input-styled">
                        <label>Новый пароль (пусто = не менять)</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="password" name="password" id="editPassword-{{ s.id }}" class="line-editor"
                                style="flex: 1;">
                            <button type="button" class="btn-base" onclick="copyToClipboard('editPassword-{{ s.id }}')"
                                title="Копировать" style="padding: 0 10px;">📋</button>
                        </div>
                    </div>
                    <div class="input-styled">
                        <label>ФИО</label>
                        <input type="text" name="full_name" value="{{ s.full_name }}" class="line-editor" required>
                    </div>
                    <div class="input-styled">
                        <label>Роль</label>
                        <select name="role" class="status-select">
                            <option value="cleaner" {% if s.role=='cleaner' %}selected{% endif %}>Уборщик</option>
                            <option value="worker" {% if s.role=='worker' %}selected{% endif %}>Рабочий</option>
                            <option value="moderator" {% if s.role=='moderator' %}selected{% endif %}>Модератор</option>
                            <option value="staff" {% if s.role=='staff' %}selected{% endif %}>Персонал</option>
                            <option value="admin" {% if s.role=='admin' %}selected{% endif %}>Администратор</option>
                        </select>
                    </div>
                    <div class="input-styled">
                        <label>Телефон</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="text" name="phone" value="{{ s.phone or '' }}" class="line-editor"
                                id="editPhone-{{ s.id }}" oninput="formatPhone(this)" style="flex: 1;">
                            <button type="button" class="btn-base" onclick="copyToClipboard('editPhone-{{ s.id }}')"
                                title="Копировать" style="padding: 0 10px;">📋</button>
                        </div>
                    </div>
                    <div class="input-styled">
                        <label>Telegram ID</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="text" name="telegram_id" value="{{ s.telegram_id or '' }}" class="line-editor"
                                id="editTelegram-{{ s.id }}" placeholder="@username" style="flex: 1;">
                            <button type="button" class="btn-base" onclick="copyToClipboard('editTelegram-{{ s.id }}')"
                                title="Копировать" style="padding: 0 10px;">📋</button>
                        </div>
                    </div>
                </div>

                <div class="input-styled" style="margin-top: 1.5rem;">
                    <label>Комментарий</label>
                    <textarea name="comment" class="line-editor"
                        style="width: 100%; min-height: 80px; padding: 10px; border: 1px solid var(--glass-border); border-radius: 12px; background: rgba(0,0,0,0.1); color: white;">{{ s.comment or '' }}</textarea>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="logout-btn" style="flex: 1;"
                        onclick="document.getElementById('staffModal').remove()">Отмена</button>
                    <button type="submit" class="add-btn-premium" style="flex: 2; justify-content: center;">Сохранить
                        изменения</button>
                </div>
            </form>
        </div>
    </div>
</div>
