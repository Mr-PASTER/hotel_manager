<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tasks</title>
    <script src="/static/js/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/fonts.css">
</head>

<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <div class="container">
        {% if user %}
        <div class="user-profile-bar">
            <div class="user-info">
                <span class="user-avatar">👤</span>
                <div class="user-details">
                    <div class="user-name">{{ user.full_name or user.username }}</div>
                    <div class="user-role">{{ user.role }}</div>
                </div>
            </div>
            <a href="/logout" class="logout-btn">Выйти</a>
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>

    <!-- Theme Switcher -->
    <div class="theme-switcher-container">
        <div class="theme-trigger" onclick="toggleThemeMenu()">🎨</div>
        <div class="theme-menu" id="themeMenu">
            <div class="theme-option" onclick="setTheme('default')">
                <div class="color-dot" style="background: linear-gradient(135deg, #0b0f19, #7c3aed);"></div> Midnight
            </div>
            <div class="theme-option" onclick="setTheme('light')">
                <div class="color-dot" style="background: linear-gradient(135deg, #ffffff, #6366f1);"></div> Luxe Light
            </div>
            <div class="theme-option" onclick="setTheme('onyx')">
                <div class="color-dot" style="background: linear-gradient(135deg, #121212, #d1d5db);"></div> Onyx Dark
            </div>
            <div class="theme-option" onclick="setTheme('emerald')">
                <div class="color-dot" style="background: linear-gradient(135deg, #062c21, #10b981);"></div> Royal
                Emerald
            </div>
            <div class="theme-option" onclick="setTheme('oceanic')">
                <div class="color-dot" style="background: linear-gradient(135deg, #0f172a, #3b82f6);"></div> Deep
                Oceanic
            </div>
        </div>
    </div>

    <script>
        function toggleThemeMenu() {
            document.getElementById('themeMenu').classList.toggle('active');
        }

        function setTheme(theme) {
            if (theme === 'default') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
            localStorage.setItem('hotel-theme', theme);
            document.getElementById('themeMenu').classList.remove('active');
        }

        // Initialize theme On Load
        const savedTheme = localStorage.getItem('hotel-theme');
        if (savedTheme) {
            setTheme(savedTheme);
        }

        // Close menu when clicking outside
        window.addEventListener('click', function (e) {
            if (!document.querySelector('.theme-switcher-container').contains(e.target)) {
                document.getElementById('themeMenu').classList.remove('active');
            }
        });
        // Global utilities
        window.formatPhone = function (input) {
            let matrix = "+7 (___) ___-__-__",
                i = 0,
                def = matrix.replace(/\D/g, ""),
                val = input.value.replace(/\D/g, "");
            if (def.length >= val.length) val = def;
            input.value = matrix.replace(/./g, function (a) {
                return /[_\d]/.test(a) && i < val.length ? val.charAt(i++) : i >= val.length ? "" : a
            });
        };

        window.initFlatpickrForRoom = function (id) {
            flatpickr("#picker-" + id, {
                mode: "range",
                dateFormat: "Y-m-d",
                minDate: "today",
                locale: "ru",
                onChange: function (selectedDates, dateStr, instance) {
                    if (selectedDates.length === 2) {
                        const start = document.getElementById('start-' + id);
                        const end = document.getElementById('end-' + id);
                        if (start) start.value = instance.formatDate(selectedDates[0], "Y-m-d");
                        if (end) end.value = instance.formatDate(selectedDates[1], "Y-m-d");
                    }
                }
            });
        };
    </script>
</body>

</html>
