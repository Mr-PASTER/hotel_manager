{% extends "base.html" %}

{% block content %}
<div class="dashboard-header">
    <h1>Управление персоналом</h1>
</div>

<div class="content-area">
    <section class="add-room-section-premium" , style="margin-bottom: 2rem;">
        <form hx-post="/staff" hx-target="#staff-list" hx-swap="beforeend" class="premium-form-inline" id="addStaffForm"
            hx-on::after-request="this.reset()">
            <div class="inline-grid">
                <div class="input-styled full-width-mobile">
                    <label>Логин</label>
                    <div class="input-with-copy">
                        <input type="text" name="username" id="newUsername" class="line-editor" placeholder="ivanov"
                            required autocomplete="off">
                        <button type="button" class="btn-base" onclick="copyToClipboard('newUsername')"
                            title="Копировать">📋</button>
                    </div>
                </div>
                <div class="input-styled full-width-mobile">
                    <label>Пароль</label>
                    <div class="input-with-copy">
                        <input type="password" name="password" id="newPassword" class="line-editor"
                            placeholder="••••••••" required autocomplete="new-password">
                        <button type="button" class="btn-base" onclick="copyToClipboard('newPassword')"
                            title="Копировать">📋</button>
                    </div>
                </div>
                <div class="input-styled">
                    <label>ФИО</label>
                    <input type="text" name="full_name" class="line-editor" placeholder="Иванов Иван Иванович" required>
                </div>
                <div class="input-styled">
                    <label>Роль</label>
                    <select name="role" class="status-select">
                        <option value="cleaner">Уборщик</option>
                        <option value="worker">Рабочий (Ремонт)</option>
                        <option value="moderator">Модератор</option>
                        <option value="staff">Персонал</option>
                        <option value="admin">Администратор</option>
                    </select>
                </div>
                <div class="input-styled">
                    <label>Телеграм ID</label>
                    <input type="text" name="telegram_id" class="line-editor" placeholder="123456789">
                </div>
                <div class="input-styled">
                    <label>Телефон</label>
                    <input type="text" name="phone" class="line-editor" placeholder="+7...">
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <button type="button" class="btn-base" onclick="generateCredentials()"
                        style="background: var(--warning); color: white; border: none; font-size: 0.75rem;">Сгенерировать</button>
                    <button type="submit" class="add-btn-premium">
                        <span>+</span> Добавить
                    </button>
                </div>
            </div>
        </form>
    </section>




    <!-- Desktop version -->
    <div class="table-container-modern desktop-only">
        <table class="hotel-table-modern">
            <thead>
                <tr>
                    <th>Логин</th>
                    <th>ФИО</th>
                    <th>Telegram ID</th>
                    <th>Телефон</th>
                    <th>Роль</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="staff-list">
                {% for s in staff %}
                {% include "partials/staff_row.html" %}
                {% endfor %}
            </tbody>
        </table>
    </div>

    <!-- Mobile version -->
    <div class="mobile-only" id="staff-list-mobile" style="display: none;">
        {% for s in staff %}
        {% include "partials/staff_row_mobile.html" %}
        {% endfor %}
    </div>
</div>


{% endblock %}
